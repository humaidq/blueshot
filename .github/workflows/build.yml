name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runs_on: ubuntu-latest
            qt_host: linux
            qt_target: desktop
            qt_arch: linux_gcc_64
            archive_name: blueshot-linux-x64.tar.gz
          - name: Windows
            runs_on: windows-latest
            qt_host: windows
            qt_target: desktop
            qt_arch: win64_msvc2022_64
            archive_name: blueshot-windows-x64.zip
          - name: macOS
            runs_on: macos-13
            qt_host: mac
            qt_target: desktop
            qt_arch: clang_64
            archive_name: blueshot-macos-x64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: ${{ matrix.qt_host }}
          target: ${{ matrix.qt_target }}
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Configure CMake
        run: >-
          cmake -S src/Blueshot.Editor.Qt -B build -GNinja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=${{ env.QT_ROOT_DIR }}
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/stage

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      - name: Bundle Windows runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          windeployqt --release --compiler-runtime "${env:GITHUB_WORKSPACE}\stage\bin\Blueshot.Editor.Qt.exe"

      - name: Bundle macOS runtime
        if: runner.os == 'macOS'
        run: macdeployqt "${GITHUB_WORKSPACE}/stage/Blueshot.Editor.Qt.app"

      - name: Create Linux archive
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -C stage -czf "dist/${{ matrix.archive_name }}" .

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "${env:GITHUB_WORKSPACE}\stage\*" -DestinationPath "${env:GITHUB_WORKSPACE}\dist\${{ matrix.archive_name }}"

      - name: Create macOS archive
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "${GITHUB_WORKSPACE}/stage/Blueshot.Editor.Qt.app" \
            "dist/${{ matrix.archive_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

      - name: Publish release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.archive_name }}
