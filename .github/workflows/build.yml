name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runs_on: ubuntu-latest
            build_env: qt
            qt_host: linux
            qt_target: desktop
            qt_arch: linux_gcc_64
            archive_name: blueshot-linux-x64.tar.gz
          - name: Linux Arm64
            runs_on: ubuntu-24.04-arm
            build_env: qt
            qt_host: linux_arm64
            qt_target: desktop
            qt_arch: linux_gcc_arm64
            archive_name: blueshot-linux-arm64.tar.gz
          - name: Windows
            runs_on: windows-latest
            build_env: msys2
            archive_name: blueshot-windows-x64.zip
            installer_name: blueshot-windows-x64.msi
            wix_arch: x64
          - name: Windows Arm64
            runs_on: windows-11-arm
            build_env: msvc
            qt_host: windows_arm64
            qt_target: desktop
            qt_arch: win64_msvc2022_arm64
            archive_name: blueshot-windows-arm64.zip
            installer_name: blueshot-windows-arm64.msi
            wix_arch: arm64
          - name: macOS
            runs_on: macos-15
            build_env: qt
            qt_host: mac
            qt_target: desktop
            qt_arch: clang_64
            archive_name: blueshot-macos-arm64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Ninja
        if: runner.os != 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Set up MSYS2
        if: matrix.build_env == 'msys2'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Install Qt
        if: matrix.build_env == 'qt' || matrix.build_env == 'msvc'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: ${{ matrix.qt_host }}
          target: ${{ matrix.qt_target }}
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Set up WiX v4
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake
        if: matrix.build_env == 'qt'
        run: >-
          cmake -S src/Blueshot.Editor.Qt -B build -GNinja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=${{ env.QT_ROOT_DIR }}
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/stage

      - name: Configure CMake (Windows x64)
        if: matrix.build_env == 'msys2'
        shell: msys2 {0}
        run: >-
          cmake -S src/Blueshot.Editor.Qt -B build -GNinja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/stage"

      - name: Configure CMake (Windows Arm64)
        if: matrix.build_env == 'msvc'
        shell: cmd
        run: call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=arm64 && cmake -S src\Blueshot.Editor.Qt -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%QT_ROOT_DIR%" -DCMAKE_INSTALL_PREFIX="%GITHUB_WORKSPACE%\stage"

      - name: Build
        if: matrix.build_env == 'qt'
        run: cmake --build build --parallel

      - name: Build (Windows x64)
        if: matrix.build_env == 'msys2'
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Build (Windows Arm64)
        if: matrix.build_env == 'msvc'
        shell: cmd
        run: call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=arm64 && cmake --build build --parallel

      - name: Install
        if: matrix.build_env == 'qt'
        run: cmake --install build

      - name: Install (Windows x64)
        if: matrix.build_env == 'msys2'
        shell: msys2 {0}
        run: cmake --install build

      - name: Install (Windows Arm64)
        if: matrix.build_env == 'msvc'
        shell: cmd
        run: call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=arm64 && cmake --install build

      - name: Bundle Windows runtime (x64)
        if: matrix.build_env == 'msys2'
        shell: msys2 {0}
        run: |
          windeployqt --release "${GITHUB_WORKSPACE}/stage/bin/Blueshot.Editor.Qt.exe"

      - name: Bundle Windows runtime (Arm64)
        if: matrix.build_env == 'msvc'
        shell: cmd
        run: windeployqt --release "%GITHUB_WORKSPACE%\stage\bin\Blueshot.Editor.Qt.exe"

      - name: Bundle macOS runtime
        if: runner.os == 'macOS'
        run: macdeployqt "${GITHUB_WORKSPACE}/stage/Blueshot.Editor.Qt.app"

      - name: Create Linux archive
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -C stage -czf "dist/${{ matrix.archive_name }}" .

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "${env:GITHUB_WORKSPACE}\stage\*" -DestinationPath "${env:GITHUB_WORKSPACE}\dist\${{ matrix.archive_name }}"

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          wix build `
            -arch ${{ matrix.wix_arch }} `
            -b BuildOutput="${env:GITHUB_WORKSPACE}\stage\bin" `
            -dProductVersion="0.1.0" `
            -out "${env:GITHUB_WORKSPACE}\dist\${{ matrix.installer_name }}" `
            installer\windows\Blueshot.wxs

      - name: Create macOS archive
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "${GITHUB_WORKSPACE}/stage/Blueshot.Editor.Qt.app" \
            "dist/${{ matrix.archive_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

      - name: Upload Windows installer artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.installer_name }}
          path: dist/${{ matrix.installer_name }}
          if-no-files-found: error

      - name: Publish release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.archive_name }}

      - name: Publish Windows installer artifact
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.installer_name }}
